services:
  postgres:
    image: postgres:16-alpine
    container_name: leadhunter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadhunter
      POSTGRES_USER: leadhunter
      POSTGRES_PASSWORD: leadhunter
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leadhunter -d leadhunter']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
